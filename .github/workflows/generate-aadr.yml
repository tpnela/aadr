name: Generate AADR Aggregations

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  update-aadr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run AADR update script
        run: python scripts/update_aadr.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md aggregations/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-generate AADR aggregations and update README"
            git push
          fi
